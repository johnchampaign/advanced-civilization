<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Stop Chrome/browser auto-translate from rewriting React-managed text
         nodes, which corrupts the DOM and crashes the reconciler with
         insertBefore/removeChild "not a child of this node" errors. -->
    <meta name="google" content="notranslate" />
    <title>Advanced Civilization</title>
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; font-family: system-ui, sans-serif; background: #1a1410; color: #eee; }
      #root { display: flex; flex-direction: column; height: 100vh; }
      /* 1995-style orange/tan control theme */
      .civ-bar { background: #b9702a; border-top: 3px solid #6e3f12; }
      .civ-panel { background: #d9974a; border: 2px solid #7a4a18; border-radius: 4px; color: #3a2207; }
      .civ-msg { background: #efd9a8; border: 2px solid #7a4a18; border-radius: 4px; color: #5a2d0a; font-weight: 700; }
      .civ-btn { background: #e89a36; border: 2px solid #7a4a18; border-radius: 4px; color: #3a2207;
                 font-weight: 700; padding: 4px 8px; cursor: pointer; font-size: 12px; }
      .civ-btn:hover { background: #f4b455; }
      .civ-btn:disabled { opacity: .5; cursor: default; }
      .civ-btn.on { background: #f6c66e; box-shadow: inset 0 0 0 2px #7a4a18; }
      .civ-nav { background: #c8782a; border: 2px solid #7a4a18; color: #3a2207; font-weight: 800;
                 padding: 6px 4px; cursor: pointer; font-size: 12px; letter-spacing: .5px; }
      .civ-nav.on { background: #f6c66e; }
      .civ-tab { flex: 1; text-align: center; padding: 3px; font-weight: 800; font-size: 12px;
                 background: #b9702a; color: #4a2a0a; border-right: 1px solid #7a4a18; cursor: pointer; }
      .civ-tab.act { background: #f6c66e; }
      .civ-lbl { font-size: 10px; letter-spacing: .5px; color: #5a3410; font-weight: 700; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/ui/main.tsx"></script>
  </body>
</html>
